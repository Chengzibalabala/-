    <style>
        /* 样式保持不变 */
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
          --primary:#ff4d94;
          --primary-light:#ff8fba;
          --secondary:#7c3aed;
          --bg:#fff0f7;
          --card:#ffffff;
          --text:#2d1b30;
          --text-light:#6b5a6e;
        }
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
        .container{max-width:600px;margin:0 auto;padding:20px;min-height:100vh}
        .welcome{text-align:center;padding:60px 20px}
        .welcome h1{font-size:28px;font-weight:800;line-height:1.3;margin-bottom:12px;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .welcome .subtitle{font-size:16px;color:var(--text-light);margin-bottom:40px}
        .welcome .sparkle{font-size:48px;margin-bottom:20px;display:block;animation:bounce 2s infinite}
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        .mode-cards{display:flex;flex-direction:column;gap:16px;margin-top:20px}
        .mode-card{background:var(--card);border-radius:20px;padding:24px;cursor:pointer;border:3px solid transparent;transition:all .3s}
        .mode-card:hover{transform:translateY(-4px);border-color:var(--primary);box-shadow:0 10px 40px rgba(255,77,148,.2)}
        .mode-card .tag{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;color:#fff;margin-bottom:10px}
        .mode-card.quick .tag{background:linear-gradient(135deg,#ff4d94,#ff8fba)}
        .mode-card.deep .tag{background:linear-gradient(135deg,#7c3aed,#a78bfa)}
        .mode-card h3{font-size:20px;margin-bottom:8px}
        .mode-card p{font-size:14px;color:var(--text-light)}
        .mode-card .meta{display:flex;gap:16px;margin-top:12px;font-size:13px;color:var(--text-light)}
        .fandom-select{text-align:center;padding:40px 20px}
        .fandom-select h2{font-size:24px;margin-bottom:8px}
        .fandom-select p{color:var(--text-light);margin-bottom:32px}
        .fandom-btns{display:flex;gap:16px;justify-content:center}
        .fandom-btn{padding:18px 36px;border-radius:16px;font-size:18px;font-weight:700;border:none;cursor:pointer;transition:all .3s;color:#fff}
        .fandom-btn.cn{background:linear-gradient(135deg,#ff2d55,#ff6b8a)}
        .fandom-btn.kr{background:linear-gradient(135deg,#00b896,#34d399)}
        .fandom-btn:hover{transform:scale(1.05)}
        .quiz-area{padding:10px 0}
        .progress-bar{height:6px;background:#ffd6e8;border-radius:3px;margin-bottom:24px;overflow:hidden}
        .progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:3px;transition:width .4s ease}
        .question-num{font-size:13px;color:var(--text-light);margin-bottom:8px;text-align:center}
        .question-text{font-size:18px;font-weight:700;line-height:1.5;margin-bottom:24px;text-align:center;min-height:56px}
        .options{display:flex;flex-direction:column;gap:12px}
        .option{background:var(--card);border:2px solid #f0d6e9;border-radius:16px;padding:16px 20px;cursor:pointer;transition:all .25s;font-size:15px;line-height:1.5;position:relative}
        .option:hover{border-color:var(--primary);background:#fff5fa;transform:translateX(4px)}
        .option.selected{border-color:var(--primary);background:linear-gradient(135deg,#fff0f7,#fce8f5)}
        .option.selected::after{content:'✓';position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--primary);font-weight:bold;font-size:18px}
        .option-label{font-size:11px;font-weight:700;color:var(--primary-light);display:block;margin-bottom:4px}
        .btn-group{display:flex;gap:12px;margin-top:28px}
        .btn-group button{flex:1;padding:16px;border-radius:16px;font-size:17px;font-weight:700;cursor:pointer;transition:all .3s;border:none;color:#fff}
        .btn-group .btn-prev{background:linear-gradient(135deg,#7c3aed,#a78bfa)}
        .btn-group .btn-next{background:linear-gradient(135deg,var(--primary),var(--secondary))}
        .btn-group button:disabled{opacity:.4;cursor:not-allowed}
        .result-area{text-align:center;padding:20px 0}
        .result-type{display:inline-block;padding:8px 28px;border-radius:30px;font-size:42px;font-weight:900;letter-spacing:4px;margin-bottom:8px;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .result-name{font-size:26px;font-weight:800;margin-bottom:8px}
        .result-tagline{font-size:15px;color:var(--text-light);margin-bottom:24px}
        .result-desc{background:var(--card);border-radius:20px;padding:24px;text-align:left;margin-bottom:20px;line-height:1.8;font-size:15px}
        .result-desc strong{color:var(--primary)}
        .result-bars{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
        .bar-item{text-align:left}
        .bar-label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;font-weight:600}
        .bar-track{height:10px;background:#ffe0ef;border-radius:5px;overflow:hidden}
        .bar-fill{height:100%;border-radius:5px}
        .share-section{margin-top:20px}
        .btn-retest{padding:14px 32px;background:var(--card);border:2px solid var(--primary);color:var(--primary);border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;margin-right:12px}
        .btn-share{padding:14px 32px;background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:button}
        .deep-analysis{background:var(--card);border-radius:20px;padding:24px;text-align:left;margin-bottom:16px}
        .deep-analysis h4{color:var(--secondary);margin-bottom:12px;font-size:17px}
        .deep-analysis p{line-height:1.9;font-size:14.5px;color:var(--text-light)}
        .deep-analysis .highlight{background:linear-gradient(120deg,#fef3ff 0%,#ede6fe 50%,#fef3ff 100%);padding:16px;border-radius:12px;margin-top:14px;border-left:4px solid var(--secondary)}
        .fade-in{animation:fadeIn .4s ease}
        @keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .slide-up{animation:slideUp .5s ease}
        @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        @media(max-width:480px){.welcome h1{font-size:24px}.mode-card h3{font-size:18px}.question-text{font-size:16px}.result-type{font-size:36px}}
    </style>
</head>

{q:'你在 Melon/ Spotify 等平台的追星习惯？',options:[

{q:'对于「入伍」这个不可避免的话题，你的心态？',options:[

{text:'利用这段时间补齐以前的物料',dim:'Z'},
{text:'计划好入伍前的每一次见面机会',dim:'F'}
]},
{q:'你在追星上的「时间分配」大概是？',options:[
{text:'每天 2 小时以上，固定追星时间',dim:'F'},

{text:'有时间就追，没时间也能放下',dim:'F'}
]},
{q:'最后一个问题：你做这个测试的真实动机？',options:[

{text:'顺便评估一下自己的追星状态',dim:'I'}

/* ===== 状态管理 ===== */
var state={
  step:'welcome',
  mode:null,
  fandom:null,
  currentQ:0,
  answers:[],
  scores:{E:0,I:0,O:0,M:0,C:0,D:0,F:0,Z:0},
  computed:[]
};

function $(s){return document.querySelector(s);}

function render(){
  var app=$('#app');

  if(state.step==='quiz'){
    while(state.computed.length <= state.currentQ){
      state.computed.push(false);
    }
  }

  if(state.step==='welcome'){
    app.innerHTML='<div class="welcome fade-in"><span class="sparkle">✨🌟💖</span><h1>追星MBTI<br>人格测试</h1><p class="subtitle">你是什么类型的追星人？16种人格等你来解锁 ✨</p><div class="mode-cards"><div class="mode-card quick" data-mode="quick"><span class="tag">⚡ 单类题数 · 10题</span><h3>快速版</h3><p>3分钟出结果，轻松简单</p><div class="meta">⏱ 约3分钟 | ⚡ 快速 | 📱 方便分享</div></div><div class="mode-card deep" data-mode="deep"><span class="tag">🧠 单类题数 · 约33题</span><h3>深度版</h3><p>8分钟深度分析，细致全面</p><div class="meta">⏱ 约8分钟 | 🧠 深度 | 📊 全面分析</div></div></div></div>';
  }else if(state.step==='fandom'){
    var mn=state.mode==='quick'?'⚡ 快速版':'🧠 深度版';
    app.innerHTML='<div class="fandom-select fade-in"><h2>'+mn+' 已选中</h2><p>请选择你的追星圈层（题目会有所不同哦~）</p><div class="fandom-btns"><button class="fandom-btn cn" data-fandom="cn">🇨🇳 内娱</button><button class="fandom-btn kr" data-fandom="kr">🇰🇷 韩娱</button></div></div>';
  }else if(state.step==='quiz'){
    var Q=state.mode==='quick'?QUESTIONS_QUICK[state.fandom]:QUESTIONS_DEEP[state.fandom];
    var total=Q.length;
    var q=Q[state.currentQ];
    var prog=(state.currentQ)/total*100;
    var opts=q.options.map(function(o,i){
      return '<div class="option '+(state.answers[state.currentQ]===i?'selected':'')+'" data-index="'+i+'"><span class="option-label">选项 '+String.fromCharCode(65+i)+'</span>'+o.text+'</div>';
    }).join('');

    app.innerHTML='<div class="quiz-area fade-in">'+
      '<div class="progress-bar"><div class="progress-fill" style="width:'+prog+'%"></div></div>'+
      '<div class="question-num">'+(state.currentQ+1)+' / '+total+'</div>'+
      '<div class="question-text">'+q.q+'</div>'+
      '<div class="options">'+opts+'</div>'+
      '<div class="btn-group">'+
        '<button class="btn-prev '+(state.currentQ===0?'disabled':'')+'" onclick="goPrev()">← 上一题</button>'+
        '<button class="btn-next '+(state.answers[state.currentQ]===undefined?'disabled':'')+'" onclick="goNext()">'+(state.currentQ===total-1?'查看结果 ✨':'下一题 →')+'</button>'+
      '</div>'+
    '</div>';
  }else if(state.step==='result'){
    var sc=state.scores;
    var ty=(sc.E>=sc.I?'E':'I')+(sc.O>=sc.M?'O':'M')+(sc.C>=sc.D?'C':'D')+(sc.F>=sc.Z?'F':'Z');
    var rd=(state.mode==='quick'?RESULTS.quick[ty]:RESULTS.deep[ty])||{};
    var dims=[
      {k:['E','I'],l:'社交能量',a:sc.E,b:sc.I,nA:'外放',nB:'内敛',c:'#ff4d94'},
      {k:['O','M'],l:'情感模式',a:sc.O,b:sc.M,nA:'唯一',nB:'多担',c:'#f59e0b'},
      {k:['C','D'],l:'支持方式',a:sc.C,b:sc.D,nA:'氪金',nB:'搬砖',c:'#7c3aed'},
      {k:['F','Z'],l:'追星节奏',a:sc.F,b:sc.Z,nA:'紧跟',nB:'佛系',c:'#00b896'}
    ];
    var mx=state.mode==='quick'?3:5;
    var bars=dims.map(function(d){
      return '<div class="bar-item"><div class="bar-label"><span>'+d.l+'：'+d.nA+' vs '+d.nB+'</span></div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(d.a/mx*100)+'%;background:'+d.c+'"></div></div></div>';
    }).join('');
    var deepHtml='';
    if(state.mode==='deep'&&rd.analysis){
      deepHtml='<div class="deep-analysis slide-up">'+rd.analysis+'</div>';
      if(rd.advice) deepHtml+='<div class="deep-analysis slide-up"><h4>🌱 给你的建议</h4><p>'+rd.advice+'</p></div>';
      if(rd.strength) deepHtml+='<div class="deep-analysis slide-up"><h4>✨ 你的优势</h4><p>'+rd.strength.map(function(s){return '• '+s;}).join('<br>')+'</p></div>';
      if(rd.weakness) deepHtml+='<div class="deep-analysis slide-up"><h4>⚠️ 可以注意</h4><p>'+rd.weakness.map(function(w){return '• '+w;}).join('<br>')+'</p></div>';
    }
    app.innerHTML='<div class="result-area slide-up">'+
      '<div class="result-type">'+ty+'</div>'+
      '<div class="result-name">'+(rd.name||'神秘类型')+'</div>'+
      '<div class="result-tagline">'+(rd.tagline||'')+'</div>'+
      (rd.desc?'<div class="result-desc fade-in">'+rd.desc+'</div>' : '')+
      '<div class="result-bars fade-in">'+bars+'</div>'+
      deepHtml+
      '<div class="share-section fade-in">'+
        '<button class="btn-retest" onclick="location.reload()">🔄 再测一次</button>'+
        '<button class="btn-share" onclick="shareResult()">📤 分享结果</button>'+
      '</div></div>';
  }
  bindEvents();
}

function goPrev(){
  if(state.currentQ===0 || state.step!=='quiz') return;

  if(state.computed[state.currentQ]){
    var Q=state.mode==='quick'?QUESTIONS_QUICK[state.fandom]:QUESTIONS_DEEP[state.fandom];
    var si=state.answers[state.currentQ];
    if(si!==undefined){
      var sd=Q[state.currentQ].options[si].dim;
      state.scores[sd]--;
      state.computed[state.currentQ]=false;
    }
  }
  state.currentQ--;
  render();
}

function goNext(){
  if(state.step!=='quiz') return;
  var Q=state.mode==='quick'?QUESTIONS_QUICK[state.fandom]:QUESTIONS_DEEP[state.fandom];
  var si=state.answers[state.currentQ];
  if(si===undefined) return;

  if(!state.computed[state.currentQ]){
    var sd=Q[state.currentQ].options[si].dim;
    state.scores[sd]++;
    state.computed[state.currentQ]=true;
  }

  if(state.currentQ<Q.length-1){
    state.currentQ++;
    render();
  }else{
    state.step='result';
    render();
  }
}

function bindEvents(){
  document.querySelectorAll('.mode-card').forEach(function(c){
    c.addEventListener('click',function(){
      state.mode=c.dataset.mode;
      state.step='fandom';
      render();
    });
  });

  document.querySelectorAll('.fandom-btn').forEach(function(b){
    b.addEventListener('click',function(){
      state.fandom=b.dataset.fandom;
      state.step='quiz';
      state.currentQ=0;
      state.answers=[];
      state.scores={E:0,I:0,O:0,M:0,C:0,D:0,F:0,Z:0};
      state.computed=[];
      render();
    });
  });

  document.querySelectorAll('.option').forEach(function(o){
    o.addEventListener('click',function(){
      var i=parseInt(o.dataset.index);
      state.answers[state.currentQ]=i;

      document.querySelectorAll('.option').forEach(function(x){
        x.classList.remove('selected');
      });
      o.classList.add('selected');

      var nextBtn=document.querySelector('.btn-next');
      var prevBtn=document.querySelector('.btn-prev');
      if(nextBtn) nextBtn.disabled=false;
      if(prevBtn) prevBtn.disabled=(state.currentQ===0);
    });
  });
}

function shareResult(){
  var ty=document.querySelector('.result-type')?document.querySelector('.result-type').textContent:'???';
  var nm=document.querySelector('.result-name')?document.querySelector('.result-name').textContent:'';
  var txt='🌙 我的追星MBTI结果【'+ty+'】'+nm+'！快来测试你是什么类型！';
  if(navigator.share){
    navigator.share({title:'追星MBTI测试',text:txt});
  }else{
    navigator.clipboard.writeText(txt).then(function(){
      alert('结果已复制到剪贴板！可以去分享了~ ✨')
    }).catch(function(){
      prompt('复制以下内容分享：',txt);
    });
  }
}

document.addEventListener('DOMContentLoaded',render);
</script>
</body>
</html>
